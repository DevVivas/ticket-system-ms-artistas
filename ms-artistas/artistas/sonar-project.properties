# ─────────────────────────────────────────────────────────────────────────
# Configuración de SonarCloud — ms-artistas
# Documentación: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
# ─────────────────────────────────────────────────────────────────────────

# Identificación del proyecto (ajustar al crear el proyecto en sonarcloud.io)
sonar.projectKey=ticket-system_ms-artistas
sonar.organization=tu-organizacion-sonarcloud
sonar.projectName=MS-Artistas
sonar.projectVersion=0.0.1

# Código fuente y tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Cobertura (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusiones del análisis (modelos, DTOs y clase de arranque sin lógica)
sonar.exclusions=**/Model/**,**/DTO/**,**/*Application.java
sonar.coverage.exclusions=**/Model/**,**/DTO/**,**/*Application.java,**/Config/**

# Codificación
sonar.sourceEncoding=UTF-8
