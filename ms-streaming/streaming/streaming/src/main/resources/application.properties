server.port=8090
spring.application.name=ms-streaming

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/db_streaming?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de otros microservicios
ms.eventos.url=http://localhost:8081
ms.tickets.url=http://localhost:8083

# Logging
logging.level.com.ticket_system.streaming=DEBUG
logging.level.org.springframework.web=INFO