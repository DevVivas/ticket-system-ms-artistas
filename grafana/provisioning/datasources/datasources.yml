# ─────────────────────────────────────────────────────────────────────────
# Aprovisionamiento automático de fuentes de datos en Grafana
# Se monta en /etc/grafana/provisioning/datasources dentro del contenedor
# ─────────────────────────────────────────────────────────────────────────
apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
