server.port=${PORT:8081}
spring.application.name=ms-eventos

# MySQL DataSource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_eventos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de otros microservicios
ms.recintos.url=${MS_RECINTOS_URL:http://localhost:8082}
ms.artistas.url=${MS_ARTISTAS_URL:http://localhost:8086}

# Logging
logging.level.com.ticketsystem.eventos=DEBUG
logging.level.org.springframework.web=INFO

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}